<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plumber Employee Dashboard</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #f5f8ff; color: #0f172a; }
    .wrap { max-width: 1100px; margin: 28px auto; padding: 0 16px; }
    .head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: 28px; }
    .sub { color: #64748b; margin: 4px 0 0; }
    .btn { border: 0; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 700; }
    .btn.primary { background: #2563eb; color: #fff; }
    .btn.warn { background: #f59e0b; color: #111827; }
    .panel { background: #fff; border: 1px solid #dbe3ef; border-radius: 14px; padding: 14px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(120px,1fr)); gap: 10px; margin-bottom: 12px; }
    .card { background: #f8fbff; border: 1px solid #dbeafe; border-radius: 12px; padding: 12px; }
    .k { font-size: 13px; color: #64748b; }
    .v { font-size: 24px; font-weight: 800; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #eef2f7; text-align: left; vertical-align: top; }
    th { font-size: 13px; background: #f8fbff; }
    select, input { border: 1px solid #cbd5e1; border-radius: 9px; padding: 8px 10px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge-completed { display: inline-block; background: #10b981; color: white; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    .note { display: none; margin: 10px 0; background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; padding: 10px; border-radius: 10px; }
    /* Modal styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { margin: 0 0 12px; font-size: 20px; color: #0f172a; }
    .modal p { margin: 0 0 16px; color: #64748b; font-size: 14px; }
    .modal-input-group { margin-bottom: 16px; }
    .modal-input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #0f172a; }
    .modal-input-group input {
      width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;
    }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; padding: 10px; border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .modal-buttons .submit { background: #2563eb; color: white; }
    .modal-buttons .submit:hover { background: #1d4ed8; }
    .modal-buttons .cancel { background: #e5e7eb; color: #0f172a; }
    .modal-buttons .cancel:hover { background: #d1d5db; }
    .hidden { display: none !important; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(120px,1fr)); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1>Plumber Service Dashboard</h1>
        <p class="sub">Only accessible to plumber employees.</p>
      </div>
      <button class="btn warn" id="logoutBtn">Logout</button>
    </div>

    <div id="apiNote" class="note"></div>

    <section class="panel">
      <div class="grid" id="cards"></div>
      <div class="toolbar">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="on_the_way">On The Way</option>
          <option value="arrived">Arrived</option>
          <option value="service_started">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn primary" id="reloadBtn">Reload Tasks</button>
      </div>
      <table>
        <thead>
          <tr><th>Service</th><th>Customer</th><th>Address</th><th>Status</th><th>Progress</th><th>Update</th></tr>
        </thead>
        <tbody id="jobsBody"></tbody>
      </table>
    </section>
  </div>

  <!-- Modal for Mark Done -->
  <div id="markDoneModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Verify Employee</h2>
      <p>Enter your User ID to verify and mark this service as completed:</p>
      <form id="markDoneForm">
        <div class="modal-input-group">
          <label for="employeeUserId">Your User ID:</label>
          <input type="text" id="employeeUserId" placeholder="Enter your employee user ID" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="cancel" onclick="window.__closeMarkDoneModal()">Cancel</button>
          <button type="submit" class="submit">Verify & Mark Done</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/plumber-dashboard.js"></script>
</body>
</html>
